<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ella</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Identical background styling for theme consistency */
            background-color: #f0e6ef; 
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.4) 4px, transparent 4px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 4px, transparent 4px);
            background-size: 64px 64px;
            
            font-family: 'Press Start 2P', monospace;
            opacity: 0;
            animation: fadeInPage 0.8s ease forwards;
        }

        .letter-card {
            background: white;
            border: 6px solid #1a1a1a;
            border-radius: 4px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
            color: #1a1a1a;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ff7aa2; /* Cute header tint pink */
            text-align: center;
        }

        p {
            font-size: 11px;
            line-height: 2;
            margin-bottom: 24px;
            text-align: left;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 40px;
            font-size: 10px;
            color: #8a7b8c;
            text-decoration: underline;
            cursor: pointer;
        }

        @keyframes fadeInPage {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="letter-card">
        <h1>DEAR ELLA,</h1>
        
        <p>WRITE YOUR BEAUTIFUL CUSTOM LETTER TEXT PARAGRAPHS RIGHT HERE...</p>
        <p>YOU CAN ADD AS MANY EXTRA PARAGRAPH TAGS AS YOU WANT, AND THE CONTAINER BOX WILL SCALE TO FIT THEM ALL COMFORTABLY.</p>
        
        <a href="index.html" class="back-btn">GO BACK</a>
    </div>

</body>
</html>
