<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Corner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0e6ef;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        .interactive-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* 1. LARGER SPRITE SIZE */
        .pixel-art {
            width: 256px; /* Increased from 128px to 256px */
            height: auto;
            image-rendering: pixelated; 
            animation: bobbing 3s ease-in-out infinite;
            transition: transform 0.1s ease;
        }

        .interactive-container:active .pixel-art {
            transform: scale(0.95);
        }

        /* 2. PIXEL ART SPEECH BUBBLE STYLE */
        .message-box {
            position: absolute;
            bottom: 275px; /* Pushed up higher to clear the bigger sprite */
            background: white;
            
            /* Thicker, blocky pixel border */
            border: 6px solid #1a1a1a; 
            border-radius: 4px; /* Slight blocky corner curve */
            
            padding: 16px 24px;
            max-width: 280px;
            text-align: center;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 16px;
            
            /* Animation transitions */
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            
            /* Retro block shadow */
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
        }

        /* The Bubble Tail (Pointer) */
        .message-box::after, .message-box::before {
            content: '';
            position: absolute;
            bottom: -22px; /* Positioned right underneath the bubble */
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
        }

        /* Outer pixel border of the tail */
        .message-box::before {
            border-color: #1a1a1a transparent transparent transparent;
            margin-bottom: -6px; /* Offsets the border thickness */
        }

        /* Inner white fill of the tail */
        .message-box::after {
            border-color: white transparent transparent transparent;
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating Particle Art */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            image-rendering: pixelated;
            animation: floatUp 2s ease-out forwards;
            font-size: 28px; /* Slightly bigger particles to match the vibe */
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); } /* Slightly deeper bob to match scale */
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            15% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r));
            }
        }
    </style>
</head>
<body>

    <div class="interactive-container" id="clickArea">
        <div class="message-box" id="messageBox"></div>
        <img src="sprite.png" alt="Pixel Art" class="pixel-art" id="mainSprite">
    </div>

    <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>

    <script>
        // (The JavaScript section remains exactly the same as before!)
        const messages = [
            "You're doing wonderfully.",
            "Take a deep breath. You've got this.",
            "It's okay to rest for a bit.",
            "Proud of you for trying your best.",
            "Everything is going to be alright.",
            "Make sure to drink some water today! ✨",
            "You are deeply appreciated."
        ];

        const floatingPool = ["✨", "💖", "⭐", "🌸", "☁️"];
        const clickArea = document.getElementById('clickArea');
        const messageBox = document.getElementById('messageBox');
        const clickSound = document.getElementById('clickSound');
        let messageTimer = null;

        clickArea.addEventListener('click', (e) => {
            clickSound.currentTime = 0; 
            clickSound.play().catch(err => console.log("Audio waiting for user gesture"));

            if (messageBox.classList.contains('show')) {
                messageBox.classList.remove('show');
                clearTimeout(messageTimer);
                setTimeout(() => { triggerNewMessage(); }, 150);
            } else {
                triggerNewMessage();
            }

            for (let i = 0; i < 3; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function triggerNewMessage() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            messageBox.textContent = messages[randomIndex];
            messageBox.classList.add('show');

            messageTimer = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }

        function createParticle(clickX, clickY) {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            const choice = floatingPool[Math.floor(Math.random() * floatingPool.length)];
            particle.textContent = choice;

            particle.style.left = `${clickX - 14}px`;
            particle.style.top = `${clickY - 14}px`;

            const randomX = (Math.random() - 0.5) * 180;
            const randomY = -(Math.random() * 120 + 100);
            const randomRotation = (Math.random() - 0.5) * 90;

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotation}deg`);

            document.body.appendChild(particle);
            particle.addEventListener('animationend', () => { particle.remove(); });
        }
    </script>
</body>
</html>
