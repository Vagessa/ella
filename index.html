<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Corner</title>
    <style>
        /* Base Styling & Center Layout */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0e6ef; /* Light pastel purple/pink background */
            font-family: 'Courier New', Courier, monospace; /* Cute retro look */
            overflow: hidden; /* Prevents scrollbars from floating art */
            user-select: none; /* Prevents accidental text highlighting on click */
        }

        /* Container to keep everything layered nicely */
        .interactive-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* Main Pixel Art with Natural Squash-and-Stretch Animation */
        .pixel-art {
            width: 256px; /* Increased scale */
            height: auto;
            image-rendering: pixelated; /* Keeps pixel art crisp, not blurry */
            
            /* Custom cubic-bezier mimics a realistic physics spring / momentum curve */
            animation: naturalBobbing 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            
            /* Sets the anchor point to the bottom so it squashes against gravity */
            transform-origin: bottom center; 
            
            transition: transform 0.1s ease;
        }

        /* Subtle mechanical response when clicked */
        .interactive-container:active .pixel-art {
            transform: scale(0.95);
        }

        /* Pixel Art Speech Bubble Style */
        .message-box {
            position: absolute;
            bottom: 285px; /* Adjust this value if it sits too close or far from your sprite's head */
            background: white;
            
            /* Thicker, blocky retro border */
            border: 6px solid #1a1a1a; 
            border-radius: 4px; /* Tiny curvature for a blocky corner */
            
            padding: 16px 24px;
            max-width: 280px;
            text-align: center;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 16px;
            
            /* Animation transitions */
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none; /* Allows clicks to pass right through to container */
            
            /* Retro block drop shadow */
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
        }

        /* Speech Bubble Tail (Pointers) */
        .message-box::after, .message-box::before {
            content: '';
            position: absolute;
            bottom: -22px; /* Pulls it right underneath the bubble border */
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
        }

        /* Outer dark border of the bubble tail */
        .message-box::before {
            border-color: #1a1a1a transparent transparent transparent;
            margin-bottom: -6px; /* Offsets for the main border line thickness */
        }

        /* Inner white fill of the bubble tail */
        .message-box::after {
            border-color: white transparent transparent transparent;
        }

        /* Toggle visibility class managed by JS */
        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating Particle Art */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            image-rendering: pixelated;
            animation: floatUp 2s ease-out forwards;
            font-size: 28px; /* Slightly upscaled particles to match layout */
        }

        /* Organic Physics-Based Bobbing Loop */
/* Organic Bobbing Loop (Pure movement, no squashing) */
@keyframes naturalBobbing {
    0%, 100% { 
        transform: translateY(0); 
    }
    /* Rising up smoothly */
    25% { 
        transform: translateY(-6px); 
    }
    /* Peak height: floating pause at the top */
    50% { 
        transform: translateY(-16px); 
    }
    /* Descending fluidly */
    75% { 
        transform: translateY(-10px); 
    }
    /* Settling gently near the baseline before starting over */
    90% { 
        transform: translateY(-2px); 
    }
}

        /* Particle Float Vector Engine */
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            15% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r));
            }
        }
    </style>
</head>
<body>

    <div class="interactive-container" id="clickArea">
        <!-- Pixel Speech Bubble -->
        <div class="message-box" id="messageBox"></div>
        
        <!-- Main Character Sprite -->
        <img src="sprite.png" alt="Pixel Art" class="pixel-art" id="mainSprite">
    </div>

    <!-- Hidden audio pipeline -->
    <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>

    <script>
        // Array of comforting strings
        const messages = [
            "You're doing wonderfully.",
            "Take a deep breath. You've got this.",
            "It's okay to rest for a bit.",
            "Proud of you for trying your best.",
            "Everything is going to be alright.",
            "Make sure to drink some water today! ✨",
            "You are deeply appreciated."
        ];

        // Particle pool options (Use emojis or replace with asset path strings)
        const floatingPool = ["✨", "💖", "⭐", "🌸", "☁️"];

        const clickArea = document.getElementById('clickArea');
        const messageBox = document.getElementById('messageBox');
        const clickSound = document.getElementById('clickSound');

        let messageTimer = null;

        clickArea.addEventListener('click', (e) => {
            // Re-trigger audio immediately from position 0 on sequential clicks
            clickSound.currentTime = 0; 
            clickSound.play().catch(err => console.log("Audio pipeline requires user interaction gesture first."));

            // Toggle / Cycle Message Windows
            if (messageBox.classList.contains('show')) {
                messageBox.classList.remove('show');
                clearTimeout(messageTimer);
                
                // Wait for the exit fade animation to finish before updating content
                setTimeout(() => {
                    triggerNewMessage();
                }, 150);
            } else {
                triggerNewMessage();
            }

            // Spawn random floating instances at point of cursor contact
            for (let i = 0; i < 3; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function triggerNewMessage() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            messageBox.textContent = messages[randomIndex];
            messageBox.classList.add('show');

            // Automatic dismissal timer (4000ms = 4 seconds)
            messageTimer = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }

        function createParticle(clickX, clickY) {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            
            const choice = floatingPool[Math.floor(Math.random() * floatingPool.length)];
            particle.textContent = choice;

            // Centers the particle origin around the absolute cursor click coordinate
            particle.style.left = `${clickX - 14}px`;
            particle.style.top = `${clickY - 14}px`;

            // Calculate individualized trajectory parameters via CSS custom properties
            const randomX = (Math.random() - 0.5) * 180; // Left-to-right spread width
            const randomY = -(Math.random() * 120 + 100); // Upward velocity ceiling
            const randomRotation = (Math.random() - 0.5) * 90; // Rotation spin velocity

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotation}deg`);

            document.body.appendChild(particle);

            // Clean up memory and DOM footprint once fade-out completes
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        }
    </script>
</body>
</html>
