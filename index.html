<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Corner</title>
    <style>
        /* Base Styling & Center Layout */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0e6ef; /* Light pastel purple/pink background */
            font-family: 'Courier New', Courier, monospace; /* Cute retro look */
            overflow: hidden; /* Prevents scrollbars from floating art */
            user-select: none; /* Prevents accidental text highlighting on click */
        }

        /* Container to keep everything layered nicely */
        .interactive-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* Main Pixel Art with Idle Bobbing Animation */
        .pixel-art {
            width: 128px; /* Adjust based on your sprite size */
            height: auto;
            image-rendering: pixelated; /* Keeps pixel art crisp, not blurry */
            animation: bobbing 3s ease-in-out infinite;
            transition: transform 0.1s ease;
        }

        /* Subtle squish effect when clicked */
        .interactive-container:active .pixel-art {
            transform: scale(0.95);
        }

        /* Comfort Message Dialogue Box */
        .message-box {
            position: absolute;
            bottom: 140px; /* Sits above the sprite */
            background: white;
            border: 4px solid #4a3f4b;
            border-radius: 12px;
            padding: 12px 20px;
            max-width: 250px;
            text-align: center;
            color: #4a3f4b;
            font-weight: bold;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none; /* Allows clicks to pass through to the container */
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating Particle Art */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            image-rendering: pixelated;
            animation: floatUp 2s ease-out forwards;
            font-size: 24px; /* If using emojis instead of images */
        }

        /* Keyframes Animations */
        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            15% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(1.2) rotate(var(--r));
            }
        }
    </style>
</head>
<body>

    <div class="interactive-container" id="clickArea">
        <!-- Message box that pops up -->
        <div class="message-box" id="messageBox"></div>
        
        <!-- Your main pixel art -->
        <img src="sprite.png" alt="Pixel Art" class="pixel-art" id="mainSprite">
    </div>

    <!-- Hidden audio element for the sound effect -->
    <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>

    <script>
        // Array of comforting messages
        const messages = [
            "You're doing wonderfully.",
            "Take a deep breath. You've got this.",
            "It's okay to rest for a bit.",
            "Proud of you for trying your best.",
            "Everything is going to be alright.",
            "Make sure to drink some water today! ✨",
            "You are deeply appreciated."
        ];

        // Optional: Array of emojis OR image paths for floating art
        // If using images, change them to paths like 'heart.png', 'star.png'
        const floatingPool = ["✨", "💖", "⭐", "🌸", "☁️"];

        const clickArea = document.getElementById('clickArea');
        const messageBox = document.getElementById('messageBox');
        const clickSound = document.getElementById('clickSound');

        let messageTimer = null;

        clickArea.addEventListener('click', (e) => {
            // 1. Play the audio snippet
            // Reset audio to start so rapid clicks re-trigger immediately
            clickSound.currentTime = 0; 
            clickSound.play().catch(err => console.log("Audio waiting for user gesture"));

            // 2. Handle Message Box Logic
            if (messageBox.classList.contains('show')) {
                // If it's already showing, hide it first, then quickly swap message
                messageBox.classList.remove('show');
                clearTimeout(messageTimer);
                
                // Slight delay to let it fade out before changing text
                setTimeout(() => {
                    triggerNewMessage();
                }, 150);
            } else {
                triggerNewMessage();
            }

            // 3. Spawn floating particles where the user clicked
            // Spawns 3 random particles per click
            for (let i = 0; i < 3; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function triggerNewMessage() {
            // Pick a random message ensuring it's not empty
            const randomIndex = Math.floor(Math.random() * messages.length);
            messageBox.textContent = messages[randomIndex];
            messageBox.classList.add('show');

            // Automatically hide after 4 seconds
            messageTimer = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }

        function createParticle(clickX, clickY) {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            
            // Choose random item from pool
            const choice = floatingPool[Math.floor(Math.random() * floatingPool.length)];
            
            // If it's an emoji, inject text. If you want images instead, uncomment below line:
            // particle.innerHTML = `<img src="${choice}" width="24" height="24">`;
            particle.textContent = choice;

            // Positioning directly on click location
            particle.style.left = `${clickX - 12}px`;
            particle.style.top = `${clickY - 12}px`;

            // Randomize trajectory angles via CSS variables
            const randomX = (Math.random() - 0.5) * 160; // Left or right drift
            const randomY = -(Math.random() * 100 + 100); // Upward movement
            const randomRotation = (Math.random() - 0.5) * 90; // Rotation spin

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotation}deg`);

            document.body.appendChild(particle);

            // Clean up the DOM element after animation ends
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        }
    </script>
</body>
</html>
