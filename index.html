<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Core crosshatch background */
            background-color: #f0e6ef; 
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.4) 4px, transparent 4px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 4px, transparent 4px);
            background-size: 64px 64px;
            
            font-family: 'Press Start 2P', monospace; 
            overflow: hidden;
            user-select: none;
        }

        /* SCREEN 1: Main Sprite Window Frame Layout */
/* Update this block inside your <style> section */
.window-frame {
    background: #fff8fc; 
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    box-sizing: border-box;
    position: relative;
    
    border: 6px solid #1a1a1a;
    border-radius: 4px;
    box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
    transition: opacity 0.5s ease;

    /* NEW RECTANGULAR RATIOS */
    width: 680px;         /* Significantly widened from 500px for a true rectangle */
    min-height: 640px;    /* Slightly taller to keep proportions beautifully balanced */
}
/* Update this block inside your <style> section */
.interactive-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    justify-content: flex-end;
    
    /* SCALE ADJUSTMENTS */
    width: 100%;          /* Flexes out to fill the entire 680px frame width */
    height: 560px;        /* Lifted slightly to keep the speech bubble aligned correctly */
}

        /* TRUE RETRO PIXEL ART SPEECH BUBBLE */
        .message-box {
            position: absolute;
            bottom: 490px;        /* Clears the upscaled 360px sprite head */
            
            background: #ffffff;
            box-shadow: 
                0 -4px 0 -4px #1a1a1a, 0 4px 0 -4px #1a1a1a,
                0 -8px 0 -4px #ffffff, 0 8px 0 -4px #ffffff,
                -4px 0 0 -4px #1a1a1a, 4px 0 0 -4px #1a1a1a,
                -8px 0 0 -4px #ffffff, 8px 0 0 -4px #ffffff,
                4px 4px 0 0 #1a1a1a, 4px -4px 0 0 #1a1a1a,
                -4px 4px 0 0 #1a1a1a, -4px -4px 0 0 #1a1a1a,
                8px 0 0 0 #1a1a1a, -8px 0 0 0 #1a1a1a,
                0 8px 0 0 #1a1a1a, 0 -8px 0 0 #1a1a1a,
                8px 8px 0 0 rgba(0,0,0,0.1);

            padding: 20px;
            width: 360px;         /* Matches sprite width */
            min-height: 60px;
            box-sizing: border-box;
            text-align: center;
            color: #1a1a1a;
            font-size: 11px;
            line-height: 1.6;
            
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s steps(4), transform 0.2s steps(4);
            pointer-events: none;
            z-index: 999;
        }

        /* Pixel Art Tail Pointer */
.message-box::after {
    content: '';
    position: absolute;
    bottom: -12px; /* Pulled up significantly into the bubble to crush sub-pixel gaps */
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 6px;
    background: #ffffff;
    
    /* 
       THE SEAM KILLER: 
       This explicit white top border acts as a visual patch. 
       It physically covers up the bubble's bottom dark border line 
       so browser rendering engine rounding errors cannot leave transparent slits.
    */
    border-top: 2px solid #ffffff; 
    box-sizing: content-box;

    box-shadow: 
        -4px 0 0 0 #1a1a1a, 4px 0 0 0 #1a1a1a,       /* Left & Right sharp outlines */
        -4px 4px 0 0 #1a1a1a, 4px 4px 0 0 #1a1a1a,   /* Diagonal outer corners */
        0 4px 0 0 #ffffff,                           /* Solid white internal fill */
        0 8px 0 0 #1a1a1a,                           /* Sharp bottom point border */
        4px 4px 0 0 rgba(0, 0, 0, 0.1);              /* Drop shadow alignment match */
}

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* DYNAMIC GROUND SHADOW */
        .sprite-shadow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;         /* Proportional to 360px width */
            height: 20px;
            background-color: rgba(0, 0, 0, 0.12); 
            border-radius: 50%;
            animation: shadowPulse 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            z-index: 1;
        }

        /* MAIN SPRITE */
        .pixel-art {
            width: 360px !important;  /* Upscaled sprite size */
            height: auto !important;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            will-change: transform;
            animation: naturalBobbing 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            position: relative;
            z-index: 2; 
            margin-bottom: 8px; 
        }

        /* FOR ELLA PIXEL BUTTON */
        .ella-btn {
            margin-top: 30px;
            background-color: #ffb3c6; 
            color: #1a1a1a;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 14px 24px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            
            border: none;
            box-shadow: 
                0 -4px 0 0 #1a1a1a, 0 4px 0 0 #1a1a1a,
                -4px 0 0 0 #1a1a1a, 4px 0 0 0 #1a1a1a,
                4px 4px 0 0 rgba(0, 0, 0, 0.15);
            
            transition: background-color 0.1s ease;
        }

        .ella-btn:hover {
            background-color: #ffc2d1; 
        }

        .ella-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 0 transparent;
        }

        /* SCREEN 2: Seamless Letter Card Frame Layout */
        .letter-card {
            background: white;
            border: 6px solid #1a1a1a;
            border-radius: 4px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
            color: #1a1a1a;
            transition: opacity 0.5s ease;
        }

        .letter-card h1 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ff7aa2; 
            text-align: center;
        }

        .letter-card p {
            font-size: 11px;
            line-height: 2;
            margin-bottom: 24px;
            text-align: left;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 40px;
            font-size: 10px;
            color: #8a7b8c;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Floating Particles */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            font-family: Arial, sans-serif;
            font-size: 48px;
            z-index: 1000;
            animation: floatUp 2s ease-out forwards;
        }

        /* Keyframes loops */
        @keyframes naturalBobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        @keyframes shadowPulse {
            0%, 100% { transform: translateX(-50%) scale(1); background-color: rgba(0, 0, 0, 0.15); }
            50% { transform: translateX(-50%) scale(0.75); background-color: rgba(0, 0, 0, 0.06); }
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            15% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.1) rotate(var(--r)); }
        }

        .pixel-art.squishing {
    animation: clickSquish 0.25s ease-out;
}

@keyframes clickSquish {
    0% {
        transform: scale(1, 1);
    }
    30% {
        /* Squashes down vertically, stretches slightly horizontally */
        transform: scale(1.08, 0.92); 
    }
    60% {
        /* Bounces slightly higher than normal on recovery */
        transform: scale(0.96, 1.04);
    }
    100% {
        transform: scale(1, 1);
    }
}
/* --- UNIVERSAL MOBILE ENGINE (SAFARI COMPATIBLE) --- */
@media (max-width: 740px), (max-height: 700px) {
    body {
        padding: 16px;
        box-sizing: border-box;
        overflow-y: auto; /* Allows smooth viewport scrolling if the screen is tiny */
        height: auto;
        min-height: 100vh;
    }

    .window-frame {
        /* FIXED: Remove Safari scale glitch by using responsive fluid layout properties directly */
        transform: none !important; 
        width: 100%;
        max-width: 440px; /* Snug, standard mobile card width */
        min-height: auto;
        padding: 24px 16px;
        margin: 20px auto;
        box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
    }

/* FIXED: Changes alignment mechanics from absolute positioning to flexible stacking */
    .interactive-container {
        width: 100%;
        height: auto;
        min-height: auto; /* Drops the fixed container height trap */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        padding-top: 20px;
    }

/* Scales down your sprite smoothly while maintaining center alignment */
    .pixel-art {
        width: 100% !important;
        max-width: 240px; 
        height: auto !important;
        margin-bottom: 0;
        position: relative;
        z-index: 2;
    }

    /* Stays pinned relative to the bottom layout floor */
    .sprite-shadow {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 12px;
        z-index: 1;
    }

/* FIXED: Stacks the speech bubble naturally above the sprite instead of guessing the height */
    .message-box {
        position: relative; /* Switches off absolute positioning */
        bottom: 0 !important; /* Wipes clean the desktop top/bottom tracking rules */
        width: 100%;
        max-width: 300px;
        margin-top: 0;
        margin-bottom: 25px; /* Creates a guaranteed, fixed safety gap above your sprite's head */
        padding: 14px;
        font-size: 10px;
        transform: translateY(0); /* Normalizes position animations */
    }

    /* Make sure the text pop animation operates smoothly under relative constraints */
    .message-box.show {
        transform: translateY(-5px);
    }

    /* Letter card adjustments */
    .letter-card {
        padding: 24px;
        width: 100%;
        max-width: 440px;
        box-sizing: border-box;
    }

    .letter-card h1 {
        font-size: 14px;
        margin-bottom: 20px;
    }

    .letter-card p {
        font-size: 10px;
        line-height: 1.8;
        margin-bottom: 16px;
    }
}

        /* Forces emojis inside the speech balloon to scale perfectly with the text height */
.bubble-emoji {
    font-family: Arial, sans-serif; 
    font-size: 16px;                
    line-height: 1;
    display: inline-block;
    
    /* ALIGNMENT FIXES */
    vertical-align: baseline;    /* Uses the text's baseline instead of trying to center a different font height */
    margin-bottom: -1px;         /* Gently pulls the emoji upward by 1 pixel to match the letters */
    margin-left: 4px;            /* Adds uniform horizontal space */
    margin-right: 4px;
}

/* Matching alignment tune-up for mobile screen dimensions */
@media (max-width: 740px), (max-height: 700px) {
    .bubble-emoji {
        font-size: 14px;
        vertical-align: baseline;
        margin-bottom: -1px;
    }
}
    </style>
</head>
<body>

    <!-- SCREEN 1: Main Sprite Frame -->
    <div class="window-frame" id="spriteFrame">
        <div class="interactive-container" id="clickArea">
            <div class="message-box" id="messageBox"></div>
            <img src="sprite.png" alt="Pixel Art" class="pixel-art" id="mainSprite">
            <div class="sprite-shadow"></div>
        </div>
        <button class="ella-btn" id="ellaButton">FOR ELLA</button>
    </div>

    <!-- SCREEN 2: Hidden Letter Card Frame (Fades in dynamically) -->
    <div class="letter-card" id="letterCard" style="display: none; opacity: 0;">
        <h1>DEAR ELLA,</h1>
        
        <p>WRITE YOUR BEAUTIFUL CUSTOM LETTER TEXT PARAGRAPHS RIGHT HERE...</p>
        <p>YOU CAN ADD AS MANY EXTRA PARAGRAPH TAGS AS YOU WANT, AND THE CONTAINER BOX WILL SCALE TO FIT THEM ALL COMFORTABLY.</p>
        
        <span class="back-btn" id="backButton">GO BACK</span>
    </div>

    <!-- Audio pipelines -->
    <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="background-music.mp3" preload="auto" loop></audio>
    <audio id="transitionSound" src="transition.mp3" preload="auto"></audio>

    <script>
        const messages = [
"YOU ARE LOVED 💖",
            "YOU ARE CARED FOR 🫂",
            "SENDING LOTS OF HUGS!! 🫂",
            "I'M THINKING OF YOU RIGHT NOW!!!",
            "I'M VERY GRATEFUL TO HAVE MET YOU, AND TO KNOW YOU!",
            "I'M CHEERING FOR YOU ALWAYS 🤗",
            "YOU ARE MY FRIEND, AND THAT MEANS FOREVER!! OKAY!?",
            "IT'S OKAY TO HAVE HARD DAYS, I'LL ALWAYS BE HERE .",
            "I HOPE TODAY IS GENTLE 😊",
            "YOU DON'T HAVE TO BE STRONG ALL THE TIME ❤️",
            "YOU ARE BEAUTIFUL.",
            "YOU ARE AMAZING, AND SO VERY CARING.",
            "PUSSY TIGHT, PUSSY FRESH, PUSSY CLEAN.",
            "BE KIND TO YOURSELF QUEEN.",
            "ELLA, I CANNOT CODE FOR SHIT THIS WAS HARD AF NGL XD",
            "😛😛😛😛😛",
            "YOU'RE DOING GREAT!!",
            "IT'S OKAY TO REST FOR A BIT.",
            "PROUD OF YOU FOR TRYING YOUR BEST.",
            "YOU ARE DEEPLY APPRECIATED."
        ];

        const floatingPool = ["🤍", "💖", "🌸", "☁️", "✨", "🌹", "🪷", "🌷"];

        const clickArea = document.getElementById('clickArea');
        const messageBox = document.getElementById('messageBox');
        const clickSound = document.getElementById('clickSound');
        const bgMusic = document.getElementById('bgMusic');
        const ellaButton = document.getElementById('ellaButton');
        const transitionSound = document.getElementById('transitionSound');
        
        const spriteFrame = document.getElementById('spriteFrame');
        const letterCard = document.getElementById('letterCard');
        const backButton = document.getElementById('backButton');
        
        let messageTimer = null;
        let messageHistory = []; 
        const historyLimit = 7;
        let musicStarted = false;

        // Unlocks background audio loop context on first interaction
        function startMusic() {
            if (!musicStarted) {
                bgMusic.volume = 0.3; 
                bgMusic.play().catch(err => console.log("Audio pipeline initialized"));
                musicStarted = true;
            }
        }

clickArea.addEventListener('click', (e) => {
        startMusic();
        clickSound.currentTime = 0; 
        clickSound.play().catch(err => {});

        // NEW: Squish Feedback Animation
        const mainSprite = document.getElementById('mainSprite');
        
        // Remove the class first just in case it's already there from a rapid double-click
        mainSprite.classList.remove('squishing'); 
        
        // Force a quick browser reflow to reset the animation timeline safely
        void mainSprite.offsetWidth; 
        
        // Apply the squish effect
        mainSprite.classList.add('squishing');

        // Clean up the class when done so the natural bobbing animation can resume smoothly
        mainSprite.addEventListener('animationend', () => {
            mainSprite.classList.remove('squishing');
        }, { once: true }); // { once: true } auto-destroys this listener so memory stays perfectly clean

        // --- Your existing message pop-up and particle logic continues exactly the same below ---
        if (messageBox.classList.contains('show')) {
            messageBox.classList.remove('show');
            clearTimeout(messageTimer);
            setTimeout(() => { triggerNewMessage(); }, 150);
        } else {
            triggerNewMessage();
        }

        for (let i = 0; i < 3; i++) {
            createParticle(e.clientX, e.clientY);
        }
    });

function triggerNewMessage() {
            let availableIndexes = [];
            for (let i = 0; i < messages.length; i++) {
                if (!messageHistory.includes(i)) {
                    availableIndexes.push(i);
                }
            }

            if (availableIndexes.length === 0) {
                messageHistory = [];
                for (let i = 0; i < messages.length; i++) {
                    availableIndexes.push(i);
                }
            }

            let randomIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
            messageHistory.push(randomIndex);

            if (messageHistory.length > historyLimit) {
                messageHistory.shift();
            }

            let rawMessage = messages[randomIndex];

            let formattedMessage = rawMessage.replace(
                /([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF])/g, 
                '<span class="bubble-emoji">$1</span>'
            );

            messageBox.innerHTML = formattedMessage;
            messageBox.classList.add('show');

            if (messageTimer) clearTimeout(messageTimer);
            messageTimer = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }
        // ==========================================

        function createParticle(clickX, clickY) {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            const choice = floatingPool[Math.floor(Math.random() * floatingPool.length)];
            particle.textContent = choice;

            particle.style.left = `${clickX - 24}px`;
            particle.style.top = `${clickY - 24}px`;

            const randomX = (Math.random() - 0.5) * 300;
            const randomY = -(Math.random() * 180 + 150);
            const randomRotation = (Math.random() - 0.5) * 180;

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotation}deg`);

            document.body.appendChild(particle);
            particle.addEventListener('animationend', () => { particle.remove(); });
        }

        // METHOD A: Crossfading view states so music never stops
        ellaButton.addEventListener('click', (e) => {
            e.stopPropagation(); 
            startMusic();

            // ADJUST LOUDNESS HERE (0.0 = muted, 1.0 = full blast)
    transitionSound.volume = 0.4; // Sets it to 40% volume. Adjust this number as needed!
            
            transitionSound.currentTime = 0;
            transitionSound.play().catch(err => {});
            
            // Fade out the main sprite window frame
            spriteFrame.style.opacity = '0';
            
            setTimeout(() => {
                spriteFrame.style.display = 'none'; 
                letterCard.style.display = 'block'; 
                
                // Smoothly fade in the letter card structure
                setTimeout(() => {
                    letterCard.style.opacity = '1';
                }, 50);
            }, 500);
        });

        // Handle going back to the main room screen
        backButton.addEventListener('click', () => {
            letterCard.style.opacity = '0';
            
            setTimeout(() => {
                letterCard.style.display = 'none';
                spriteFrame.style.display = 'flex';
                
                setTimeout(() => {
                    spriteFrame.style.opacity = '1';
                }, 50);
            }, 500);
        });
    </script>
</body>
</html>
