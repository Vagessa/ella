<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Corner</title>
    <!-- Import authentic retro pixel art font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0e6ef;
            /* Apply pixel font globally */
            font-family: 'Press Start 2P', monospace; 
            overflow: hidden;
            user-select: none;
        }

        /* Flex column layout naturally pushes the bubble ABOVE the sprite 
           without relying on absolute coordinates that clip headers */
        .interactive-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        /* TRUE RETRO PIXEL ART SPEECH BUBBLE (Stair-stepped styling) */
        .message-box {
            position: relative;
            background: #ffffff;
            
            /* Multi-layered box-shadow generates a clean blocky 4px pixel outline 
               instead of smooth anti-aliased browser vectors */
            box-shadow: 
                0 -4px 0 -4px #1a1a1a,
                0 4px 0 -4px #1a1a1a,
                0 -8px 0 -4px #ffffff,
                0 8px 0 -4px #ffffff,
                -4px 0 0 -4px #1a1a1a,
                4px 0 0 -4px #1a1a1a,
                -8px 0 0 -4px #ffffff,
                8px 0 0 -4px #ffffff,
                4px 4px 0 0 #1a1a1a,
                4px -4px 0 0 #1a1a1a,
                -4px 4px 0 0 #1a1a1a,
                -4px -4px 0 0 #1a1a1a,
                8px 0 0 0 #1a1a1a,
                -8px 0 0 0 #1a1a1a,
                0 8px 0 0 #1a1a1a,
                0 -8px 0 0 #1a1a1a,
                8px 8px 0 0 rgba(0,0,0,0.15); /* Retro block shadow */

            padding: 16px;
            width: 280px;
            min-height: 50px;
            box-sizing: border-box;
            text-align: center;
            color: #1a1a1a;
            font-size: 11px; /* Small size fits the crisp retro typography best */
            line-height: 1.6;
            
            /* Safe gap between text box bottom and sprite head top */
            margin-bottom: 40px; 
            
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s steps(4), transform 0.2s steps(4);
            pointer-events: none;
        }

        /* Pixel Art Tail Pointer (Stair-stepped block boxes) */
        .message-box::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 8px;
            background: white;
            box-shadow: 
                -4px 0 0 0 #1a1a1a, 
                4px 0 0 0 #1a1a1a,
                0 4px 0 0 #1a1a1a,
                -4px 4px 0 -4px #1a1a1a,
                4px 4px 0 -4px #1a1a1a,
                -4px 8px 0 -4px #1a1a1a,
                0 8px 0 -4px #1a1a1a;
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* FORCE UPSCALED SPRITE */
        .pixel-art {
            width: 256px !important;
            height: auto !important;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            
            /* Rigorous up-and-down bobbing loop without compression deforms */
            animation: naturalBobbing 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        /* Floating Particles */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            font-family: Arial, sans-serif; /* Fallback to keep emojis uniform */
            font-size: 32px;
            z-index: 1000;
            animation: floatUp 2s ease-out forwards;
        }

        /* Rigid Up-And-Down Physics Translation Loop */
        @keyframes naturalBobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); } /* Safe clearance ceiling */
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            15% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.1) rotate(var(--r)); }
        }
    </style>
</head>
<body>

    <div class="interactive-container" id="clickArea">
        <!-- Pixel Speech Bubble -->
        <div class="message-box" id="messageBox"></div>
        
        <!-- Main Character Sprite -->
        <img src="sprite.png" alt="Pixel Art" class="pixel-art" id="mainSprite">
    </div>

    <audio id="clickSound" src="click-sound.mp3" preload="auto"></audio>

    <script>
        // Array of comforting strings (All caps works exceptionally well with 8-bit typography)
        const messages = [
            "YOU'RE DOING WONDERFULLY.",
            "TAKE A DEEP BREATH. YOU'VE GOT THIS.",
            "IT'S OKAY TO REST FOR A BIT.",
            "PROUD OF YOU FOR TRYING YOUR BEST.",
            "EVERYTHING IS GOING TO BE ALRIGHT.",
            "DRINK SOME WATER TODAY! ✨",
            "YOU ARE DEEPLY APPRECIATED."
        ];

        const floatingPool = ["✨", "💖", "⭐", "🌸", "☁️"];

        const clickArea = document.getElementById('clickArea');
        const messageBox = document.getElementById('messageBox');
        const clickSound = document.getElementById('clickSound');
        let messageTimer = null;

        clickArea.addEventListener('click', (e) => {
            clickSound.currentTime = 0; 
            clickSound.play().catch(err => console.log("Audio waiting for interaction."));

            if (messageBox.classList.contains('show')) {
                messageBox.classList.remove('show');
                clearTimeout(messageTimer);
                setTimeout(() => { triggerNewMessage(); }, 150);
            } else {
                triggerNewMessage();
            }

            for (let i = 0; i < 3; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function triggerNewMessage() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            messageBox.textContent = messages[randomIndex];
            messageBox.classList.add('show');

            messageTimer = setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }

        function createParticle(clickX, clickY) {
            const particle = document.createElement('div');
            particle.classList.add('floating-particle');
            const choice = floatingPool[Math.floor(Math.random() * floatingPool.length)];
            particle.textContent = choice;

            particle.style.left = `${clickX - 16}px`;
            particle.style.top = `${clickY - 16}px`;

            const randomX = (Math.random() - 0.5) * 180;
            const randomY = -(Math.random() * 120 + 100);
            const randomRotation = (Math.random() - 0.5) * 90;

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotation}deg`);

            document.body.appendChild(particle);
            particle.addEventListener('animationend', () => { particle.remove(); });
        }
    </script>
</body>
</html>
